<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1629159505/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

    <style>
        :root { --bg-gradient: radial-gradient(circle at center, #1a0b1a 0%, #000000 100%); }
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000000; background-image: var(--bg-gradient); 
            font-family: 'Noto Serif SC', serif; color: white; 
            user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        
        /* 翻转卡片 */
        .flip-card { background-color: transparent; perspective: 1000px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 1.2rem; overflow: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); }

        /* UI 层 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1.5rem; box-sizing: border-box; transition: opacity 0.5s; }
        .interactive-element { pointer-events: auto; cursor: pointer; }
        .input_video { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        
        /* 启动页样式 */
        #start-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            pointer-events: auto;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .start-card {
            background: rgba(20, 10, 20, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 105, 180, 0.3);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.2);
        }

        #blow-meter-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 280px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; opacity: 0; transition: opacity 0.5s; }
        #blow-meter-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff9a9e 0%, #ff69b4 100%); border-radius: 10px; transition: width 0.1s linear; box-shadow: 0 0 15px #ff69b4; }
        #blow-hint { position: absolute; bottom: 18%; width: 100%; text-align: center; font-size: 14px; color: rgba(255,255,255,0.8); text-shadow: 0 2px 4px rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.5s; }

        #surprise-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 80; pointer-events: none; transition: background 0.5s ease; }
        #surprise-layer.hidden { display: none !important; }
        #surprise-layer.active { pointer-events: auto; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }

        .font-handwriting { font-family: 'Dancing Script', cursive; }
        .pop-in { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .safe-click-area { z-index: 90; position: relative; touch-action: manipulation; }
        .neon-text { text-shadow: 0 0 10px rgba(255,105,180,0.7), 0 0 20px rgba(255,105,180,0.5); }

        #floating-gift-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 200; width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 105, 180, 0.5);
            display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4); animation: float-btn 3s ease-in-out infinite;
            transition: transform 0.3s, background 0.3s; pointer-events: auto;
        }
        #floating-gift-btn:hover { transform: scale(1.1) rotate(10deg); background: rgba(255, 105, 180, 0.3); }
        #floating-gift-btn.hidden { display: none !important; }

        #settings-panel {
            position: absolute; top: 80px; right: 20px; width: 140px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 15px; z-index: 50; display: none; 
            flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .color-control { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #ddd; }
        .color-control input { width: 30px; height: 20px; border: none; border-radius: 4px; cursor: pointer; background: transparent; }

        #top-banner {
            position: absolute; top: 10%; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 5;
            animation: float-banner 4s ease-in-out infinite;
        }
        #top-banner.hidden { display: none !important; }
        .banner-text {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(to right, #ff9a9e, #fad0c4, #fad0c4, #a18cd1, #fbc2eb);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,192,203,0.8));
        }

        #protocol-warning {
            position: fixed; top: 0; left: 0; width: 100%; background: #ff4444; color: white;
            text-align: center; padding: 10px; z-index: 10000; font-size: 14px; display: none;
        }
        
        /* 滚动文字区域样式 - 优化高度以适应长文 */
        .scrollable-text {
            max-height: 280px; 
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,105,180,0.5) transparent;
        }
        .scrollable-text::-webkit-scrollbar { width: 4px; }
        .scrollable-text::-webkit-scrollbar-thumb { background-color: rgba(255, 105, 180, 0.5); border-radius: 10px; }
    </style>
</head>
<body>
    
    <div id="protocol-warning">
        ⚠️ 检测到您直接打开了HTML文件 (file://)。摄像头和麦克风可能无法使用。建议使用 Live Server 运行。
    </div>

    <audio id="bgm" loop>
        <source src="./src/happy-birthday-155461.mp3" type="audio/mpeg">
    </audio>

    <video class="input_video" playsinline></video>
    <div id="canvas-container"></div>
    
    <button id="floating-gift-btn" class="hidden safe-click-area" title="查看祝福">🎁</button>

    <div id="start-overlay">
        <div class="text-center max-w-md p-8 glass-panel start-card mx-4 animate-float">
            <h1 class="text-6xl mb-2 font-handwriting text-transparent bg-clip-text bg-gradient-to-r from-pink-300 to-purple-400 drop-shadow-lg">Happy Birthday</h1>
            <div class="space-y-4 text-gray-200 text-lg mb-8 font-light">
                <p>👋 <b>对着镜头 举起双手</b> 唤醒魔法</p>
                <p>💨 <b>持续吹气</b> 许下心愿</p>
            </div>
            <button id="start-btn" class="safe-click-area px-12 py-4 bg-gradient-to-r from-pink-600 to-purple-700 rounded-full font-bold text-xl hover:scale-105 active:scale-95 transition transform shadow-[0_0_20px_rgba(255,105,180,0.5)] text-white border border-white/20 cursor-pointer">
                进入魔法世界
            </button>
            <div id="loading-text" class="hidden mt-4 text-pink-300 text-sm">正在编织星光...</div>
        </div>
    </div>

    <div id="blow-hint"><p class="text-lg font-bold text-pink-200 mb-1">🎤 对着麦克风吹气</p></div>
    <div id="blow-meter-container"><div id="blow-meter-bar"></div></div>

    <div id="top-banner" class="hidden">
        <h1 class="text-5xl md:text-7xl banner-text">Happy Birthday</h1>
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="flex justify-between items-start w-full">
            <div class="glass-panel px-4 py-2">
                <div id="status-dot" class="inline-block w-2 h-2 rounded-full bg-red-500 mr-2"></div>
                <span id="status-text" class="text-xs text-gray-300">SYSTEM READY</span>
            </div>
            <div class="flex gap-2">
                <button id="settings-toggle" class="interactive-element p-3 glass-panel hover:bg-white/20 transition rounded-full text-sm">🎨</button>
                <button id="music-btn" class="interactive-element p-3 glass-panel hover:bg-white/20 transition rounded-full">🎵</button>
            </div>
        </div>
        
        <div id="settings-panel">
            <div class="color-control"><span>底层</span><input type="color" id="picker-bottom" value="#FF69B4"></div>
            <div class="color-control"><span>顶层</span><input type="color" id="picker-top" value="#FFB6C1"></div>
            <div class="color-control"><span>奶油</span><input type="color" id="picker-cream" value="#FFFFFF"></div>
        </div>

        <div id="center-instruction" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none w-full">
            <div class="flex items-center justify-center gap-4 mb-2">
                <span id="hand-icon" class="text-6xl animate-bounce">👋</span>
                <h2 id="instruction-text" class="text-5xl md:text-7xl font-bold text-white transition-all">举起双手</h2>
            </div>
            <p id="auto-countdown-text" class="mt-4 text-sm text-pink-200/60 hidden"></p>
        </div>

        <div id="cam-preview-container" class="absolute bottom-6 left-6 z-50 opacity-80">
            <div class="glass-panel p-1 rounded-xl">
                <div class="relative w-28 h-20 bg-black/40 rounded-lg overflow-hidden">
                    <canvas id="output_canvas" width="160" height="120" class="w-full h-full object-cover transform scale-x-[-1]"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="surprise-layer" class="hidden">
        <button id="reveal-btn" class="safe-click-area hidden px-10 py-5 bg-white text-pink-600 rounded-full font-bold text-2xl shadow-lg animate-float">🎁 打开礼物</button>
        
        <div id="flip-card-container" class="hidden flip-card w-full max-w-sm md:max-w-md aspect-[3/4] mx-6">
            <div class="flip-card-inner">
                <div class="flip-card-front glass-panel bg-gradient-to-br from-pink-500/40 to-purple-600/40 p-1">
                    <div class="bg-black/80 rounded-[1rem] p-6 h-full flex flex-col backdrop-blur-md">
                        <div class="w-full aspect-[4/3] bg-gray-800 rounded-lg mb-6 overflow-hidden relative">
                            <img src="https://bpic.588ku.com/Templet_origin_pic/05/19/43/8c971b1364922e551b4fbccb2d5719d2.jpg" class="w-full h-full object-cover">
                            <div class="absolute bottom-3 left-4 text-white/90 font-handwriting text-2xl">Happy Birthday!</div>
                        </div>
                        <div class="text-center mt-auto mb-8">
                            <p class="text-gray-300 mb-6 font-light">有些话，想在这特殊的时刻对你说。</p>
                            <button id="next-surprise-btn" class="safe-click-area w-full py-3 bg-gradient-to-r from-pink-600 to-purple-700 rounded-xl font-bold text-white">点击阅读信件 ✨</button>
                        </div>
                    </div>
                </div>

                <div class="flip-card-back glass-panel bg-gradient-to-br from-purple-500/40 to-blue-600/40 p-1">
                    <div class="bg-black/90 rounded-[1rem] p-6 h-full flex flex-col items-center backdrop-blur-md">
                        
                        <div id="card-page-1" class="w-full h-full flex flex-col">
                            <h3 class="text-xl font-bold text-pink-300 mb-4 font-handwriting text-center">致最特别的你</h3>
                            <div id="typewriter-text-1" class="text-left text-gray-200 space-y-4 font-light leading-relaxed text-sm border-l-2 border-pink-500/50 pl-4 mb-4 flex-grow scrollable-text"></div>
                            
                            <button id="to-page-2-btn" class="safe-click-area px-6 py-2 mt-auto rounded-full bg-white/10 text-pink-200 text-xs mx-auto">
                                还有一点小叮嘱... 👉
                            </button>
                        </div>

                        <div id="card-page-2" class="w-full h-full flex flex-col hidden">
                            <h3 class="text-lg font-bold text-purple-300 mb-4 font-handwriting text-center mt-2">一点小小的歉意</h3>
                            <div id="typewriter-text-2" class="text-left text-gray-200 space-y-3 font-light text-sm border-l-2 border-purple-500/50 pl-4 mb-4 flex-grow scrollable-text"></div>
                            <button id="close-card-btn" class="safe-click-area px-8 py-2 mt-auto rounded-full border border-white/30 text-gray-300 text-xs mx-auto">收起信件</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const CAKE_THEME = { bottom: "#FF69B4", top: "#FFB6C1", cream: "#FFFFFF" };
        const VISUAL_CONFIG = { particleCount: IS_MOBILE ? 3500 : 7000, color: 0xff69b4, blowThreshold: 20 };
        const STATE = { INTRO: -1, IDLE: 0, COUNTDOWN: 1, CAKE: 2, BLOWING: 3, CELEBRATION: 4 };
        
        let currentState = STATE.INTRO;
        let interactionMode = 0; 
        let particlesData = [];
        let scene, camera, renderer, particleSystem, analyser;
        let time = 0, blowProgress = 0, isSpacePressed = false, isTouching = false;
        let rotationVelocity = 0, isDragging = false, previousMouseX = 0;
        let shapeCache = {};
        const bgm = document.getElementById('bgm');

        const ui = {
            startOverlay: document.getElementById('start-overlay'),
            uiLayer: document.getElementById('ui-layer'),
            statusText: document.getElementById('status-text'),
            statusDot: document.getElementById('status-dot'),
            mainText: document.getElementById('instruction-text'),
            handIcon: document.getElementById('hand-icon'),
            blowMeter: document.getElementById('blow-meter-container'),
            blowBar: document.getElementById('blow-meter-bar'),
            blowHint: document.getElementById('blow-hint'),
            surpriseLayer: document.getElementById('surprise-layer'),
            revealBtn: document.getElementById('reveal-btn'),
            floatingGiftBtn: document.getElementById('floating-gift-btn'),
            cardContainer: document.getElementById('flip-card-container'), 
            nextBtn: document.getElementById('next-surprise-btn'),
            closeBtn: document.getElementById('close-card-btn'),
            settingsPanel: document.getElementById('settings-panel'),
            settingsToggle: document.getElementById('settings-toggle'),
            topBanner: document.getElementById('top-banner'),
            startBtn: document.getElementById('start-btn'),
            page1: document.getElementById('card-page-1'),
            page2: document.getElementById('card-page-2'),
            toPage2Btn: document.getElementById('to-page-2-btn'),
            text1: document.getElementById('typewriter-text-1'),
            text2: document.getElementById('typewriter-text-2'),
            autoText: document.getElementById('auto-countdown-text')
        };

        // --- 祝福语内容 ---
        const wishes_part1 = [
            "生日快乐！",
            "",
            "写这份贺卡时，我一直在想应该用什么样的词藻去形容我们的这四个月时光，",
            "但是想来想去，最后脑海里浮现的，反而你可能觉得很普通的一个瞬间——和你视频一起听歌写作业的时候。",
            "",
            "我以前一直觉得爱应该是轰轰烈烈的，但是和你在一起久了以后才发现，其实最好的状态就是这种平淡的笃定 —— 两个人都没有说话，在认真专注于自己的事情（虽然我一直在偷看你）。",
            "",
            "因为有你，我会更加努力去成为更好的自己，和你一起长大。这四个月不算太长，但和你在一起的每一天，都让我对陪伴有了新的理解。",
            "",
            "陪伴是分享欲有了归宿，那些外人可能觉得毫无营养的碎碎念和生活的琐碎事情，都因为有了你的倾听而变得有意义（即使你会用“好嘛”敷衍我）。",
            "",
            "陪伴是即使在最忙碌的一天里也会空出那么一点时间，专门留给你，让彼此安心。",
            "",
            "陪伴是知道你今天心情不好，我会尽力去哄你，让你把委屈发泄出来，从以前自己哄自己的你，变成能有依靠的小爱哭鬼。",
            "",
            "陪伴是睡前互道的那声晚安和早上的早安，让每一个平凡的日子都有了一个确定的开始和结尾。",
            "",
            "陪伴是那种懂彼此心照不宣的默契，因为我们知道在彼此面前我们可以做最真实的自己，不用刻意去掩盖什么或者去害怕什么（已接受“小萝卜头下头男”人设）。",
            "",
            "你说你很少过生日，因为家里人没有这个传统。我想说的是 —— 我愿意我也希望有机会以后能陪在你身边去嘲笑你每一次变老的机会（终于20岁了大妈菲）。",
            "",
            "在新的一年里，我不祝你永远无忧无虑，因为生活总有起伏不定的时候，但我希望你永远都有回头的底气，因为你知道我会一直在你的身后。",
            "",
            "希望在新的一年里你可以拥有更多属于自己的快乐，想去的地方就去，想吃的东西就吃，想尝试的活动就去尝试。",
            "",
            "希望你还是那个我认识的，偶尔有点小迷糊，但大多数时候都温柔且坚定的女孩。",
            "",
            "希望你一直是专属于我的小狗。"
        ];

        const wishes_part2 = [
            "Sorry，有点小遗憾...",
            "因为物流和准备时间的原因，实体礼物可能没能准时送到你手上。😭",
            "但我保证，它正在飞奔向你的路上！",
            "",
            "快递单号：[这里填入你的单号]",
            "你可以去顺丰查查看进度哦。",
            "希望你喜欢这个数字惊喜和即将到来的礼物！🎉🎂",
            "记得开箱了拍给我看哦！📸"
        ];

        // --- 初始化 Three.js ---
        initThree();
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            createParticles();
            preloadShapes();
            render();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(VISUAL_CONFIG.particleCount * 3);
            const colors = new Float32Array(VISUAL_CONFIG.particleCount * 3);
            const sizes = new Float32Array(VISUAL_CONFIG.particleCount);
            
            for (let i = 0; i < VISUAL_CONFIG.particleCount; i++) {
                const x = (Math.random() - 0.5) * 200;
                const y = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 100;
                pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
                particlesData.push({
                    current: new THREE.Vector3(x,y,z),
                    target: new THREE.Vector3(x,y,z),
                    baseTarget: new THREE.Vector3(x,y,z),
                    type: 'bg',
                    targetColor: new THREE.Color(0x333333),
                    angle: Math.random() * Math.PI * 2,
                    radius: 20 + Math.random() * 50
                });
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        // --- 形状变换 ---
        function getShapePoints(type, text) {
            const pts = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 300;

            if (type === 'text') {
                ctx.font = 'bold 150px Arial';
                ctx.fillStyle = 'white'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(text, 150, 150);
                const data = ctx.getImageData(0,0,300,300).data;
                for(let y=0; y<300; y+=4) {
                    for(let x=0; x<300; x+=4) {
                        if(data[(y*300+x)*4+3]>128) {
                            pts.push({ vec: new THREE.Vector3((x-150)/4, -(y-150)/4, 0).multiplyScalar(2.5), type: 'text' });
                        }
                    }
                }
            } else if (type === 'cake') {
                // 简化版蛋糕点阵生成
                for(let i=0; i<3000; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const r = 15; const h = Math.random() * 15;
                    pts.push({ vec: new THREE.Vector3(r*Math.cos(theta), h-10, r*Math.sin(theta)), type: 'cake', layer: h > 10 ? 'top' : 'bottom' });
                }
                for(let i=0; i<500; i++) {
                    const h = Math.random() * 10;
                    pts.push({ vec: new THREE.Vector3((Math.random()-0.5), h+5, (Math.random()-0.5)), type: 'flame', color: new THREE.Color(0xffaa00) });
                }
            }
            return pts;
        }

        function preloadShapes() {
            setTimeout(() => {
                shapeCache['3'] = getShapePoints('text', '3');
                shapeCache['2'] = getShapePoints('text', '2');
                shapeCache['1'] = getShapePoints('text', '1');
                shapeCache['cake'] = getShapePoints('cake');
            }, 500);
        }

        function transitionTo(key) {
            const targets = shapeCache[key] || [];
            particlesData.forEach((p, i) => {
                if (i < targets.length) {
                    p.target.copy(targets[i].vec);
                    p.type = targets[i].type;
                    p.layer = targets[i].layer;
                    p.targetColor = targets[i].color || new THREE.Color(0xffffff);
                } else {
                    p.type = 'bg';
                    p.targetColor = new THREE.Color(0x222222);
                }
            });
        }

        // --- 逻辑与交互 ---
        ui.startBtn.addEventListener('click', async () => {
            ui.startBtn.disabled = true;
            ui.startOverlay.classList.add('hidden');
            ui.uiLayer.style.display = 'flex';
            currentState = STATE.IDLE;
            bgm.play();
            initAudio();
            initCamera();
            
            // 自动开启倒计时（如果没检测到手势）
            setTimeout(() => {
                if(currentState === STATE.IDLE) startSequence();
            }, 8000);
        });

        function startSequence() {
            if(currentState !== STATE.IDLE) return;
            currentState = STATE.COUNTDOWN;
            ui.handIcon.style.display = 'none';
            let count = 3;
            transitionTo('3');
            const timer = setInterval(() => {
                count--;
                if(count > 0) transitionTo(count.toString());
                else { clearInterval(timer); showCake(); }
            }, 1500);
        }

        function showCake() {
            currentState = STATE.BLOWING;
            transitionTo('cake');
            ui.mainText.innerText = "许个愿吧";
            ui.blowMeter.style.opacity = '1';
            ui.blowHint.style.opacity = '1';
            ui.topBanner.classList.remove('hidden');
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                source.connect(analyser);
                checkBlow();
            } catch(e) { console.log("麦克风不可用"); }
        }

        function checkBlow() {
            if (currentState === STATE.BLOWING) {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b) / data.length;
                
                if (vol > VISUAL_CONFIG.blowThreshold || isSpacePressed) {
                    blowProgress += 0.5;
                } else {
                    blowProgress = Math.max(0, blowProgress - 0.2);
                }
                ui.blowBar.style.width = blowProgress + '%';
                if(blowProgress >= 100) celebrate();
            }
            requestAnimationFrame(checkBlow);
        }

        function celebrate() {
            currentState = STATE.CELEBRATION;
            ui.blowMeter.style.opacity = '0';
            ui.blowHint.style.opacity = '0';
            ui.mainText.innerText = "愿望成真 ✨";
            setTimeout(() => {
                ui.surpriseLayer.classList.remove('hidden');
                ui.surpriseLayer.classList.add('active');
                ui.revealBtn.classList.remove('hidden');
            }, 1000);
        }

        // --- 卡片控制 ---
        ui.revealBtn.addEventListener('click', () => {
            ui.revealBtn.classList.add('hidden');
            ui.cardContainer.classList.remove('hidden');
        });

        ui.nextBtn.addEventListener('click', () => {
            ui.cardContainer.classList.add('flipped');
            setTimeout(() => typeWriter(wishes_part1, 'typewriter-text-1', 40), 500);
        });

        ui.toPage2Btn.addEventListener('click', () => {
            ui.page1.classList.add('hidden');
            ui.page2.classList.remove('hidden');
            setTimeout(() => typeWriter(wishes_part2, 'typewriter-text-2', 40), 100);
        });

        ui.closeBtn.addEventListener('click', () => {
            ui.surpriseLayer.classList.add('hidden');
            ui.floatingGiftBtn.classList.remove('hidden');
        });

        ui.floatingGiftBtn.addEventListener('click', () => {
            ui.surpriseLayer.classList.remove('hidden');
            ui.cardContainer.classList.remove('flipped');
            ui.page1.classList.remove('hidden');
            ui.page2.classList.add('hidden');
        });

        function typeWriter(arr, id, speed) {
            const el = document.getElementById(id);
            el.innerHTML = "";
            let l = 0, c = 0;
            function type() {
                if (l < arr.length) {
                    if (c < arr[l].length) {
                        el.innerHTML += arr[l].charAt(c);
                        c++;
                        setTimeout(type, speed);
                    } else {
                        el.innerHTML += "<br>";
                        l++; c = 0;
                        setTimeout(type, speed * 2);
                    }
                    el.scrollTop = el.scrollHeight;
                }
            }
            type();
        }

        // --- 核心渲染循环 ---
        function render() {
            time += 0.02;
            const pos = particleSystem.geometry.attributes.position.array;
            const colAttr = particleSystem.geometry.attributes.color.array;
            const sizeAttr = particleSystem.geometry.attributes.size.array;

            particlesData.forEach((p, i) => {
                // 基础平滑移动
                p.current.lerp(p.target, 0.05);

                // 简单的粒子动效
                if(p.type === 'bg') {
                    p.current.x += Math.sin(time + i) * 0.05;
                    p.current.y += Math.cos(time + i) * 0.05;
                }

                pos[i*3] = p.current.x;
                pos[i*3+1] = p.current.y;
                pos[i*3+2] = p.current.z;

                colAttr[i*3] = p.targetColor.r;
                colAttr[i*3+1] = p.targetColor.g;
                colAttr[i*3+2] = p.targetColor.b;
                
                sizeAttr[i] = p.type === 'flame' ? 2 + Math.sin(time*5) : 1.2;
            });

            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.geometry.attributes.color.needsUpdate = true;
            particleSystem.geometry.attributes.size.needsUpdate = true;

            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        // --- 摄像头手势 (MediaPipe) ---
        async function initCamera() {
            const video = document.getElementsByClassName('input_video')[0];
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    ui.statusDot.style.backgroundColor = "#4ade80";
                    if(currentState === STATE.IDLE) startSequence();
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 160, height: 120
            });
            camera.start();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('keydown', (e) => { if(e.code === 'Space') isSpacePressed = true; });
        document.addEventListener('keyup', (e) => { if(e.code === 'Space') isSpacePressed = false; });
    </script>
</body>
</html>
